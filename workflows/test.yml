name: Run Tests

on:
  push:
    branches:
      - main # Выполнять тестирование при изменении ветки 'main'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v2
    - name: Set up .NET Core SDK
      uses: actions/setup-dotnet@v1
      with:
        dotnet-version: '6.x' # Используем последнюю версию среды выполнения (.NET 6)

    - name: Restore dependencies
      run: dotnet restore

    - name: Build project
      run: dotnet build --configuration Release --no-restore

    - name: Run tests
      run: dotnet test --no-build --logger trx
